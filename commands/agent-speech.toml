description = "Control Agent Speech without shell approval prompts"
prompt = """
Interpret `{{args}}` and call MCP tools as follows:

- If args are exactly `status`, call `agent_speech_status` with empty arguments.
- If args start with `speak `, call `speak_text` with `text` set to the remaining content after `speak `.
- Otherwise call `agent_speech_command`.

Supported forms:
- `status` -> call `agent_speech_status`
- `speak <text>` -> call `speak_text` with text=<text>
- `enable` -> action: enable
- `disable` -> action: disable
- `toggle` -> action: toggle
- `reset` -> action: reset
- `set-voice <name>` -> action: set_voice, value: <name>
- `set-rate <50-400>` -> action: set_rate, value: <number>
- `set-volume <0-100>` -> action: set_volume, value: <number>
- `set-language <code>` -> action: set_language, value: <code> (en, ko, ja, zh-CN, es, fr, de, it)
- `list-voices` -> action: list_voices

If args are invalid, show concise usage examples.
"""
